><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Switch Surprise</title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    #switch {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        font-size: 20px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
        background: #444;
        color: white;
        transition: transform 0.2s;
    }

    #switch:active {
        transform: translate(-50%, -50%) scale(0.95);
    }

    #message {
        position: absolute;
        top: 25%;
        width: 100%;
        font-size: 45px;
        color: #ff4da6;
        opacity: 0;
        transition: opacity 1.5s ease;
    }

    .light-on {
        background: radial-gradient(circle, #fff7c2, #ffffff);
        transition: background 1s ease;
    }

    .balloon {
        position: absolute;
        bottom: -120px;
        border-radius: 50%;
        animation: floatUp linear forwards;
    }

    @keyframes floatUp {
        to {
            transform: translateY(-130vh);
        }
    }

    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        opacity: 0.8;
        animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
        to {
            transform: translateY(120vh) rotate(720deg);
        }
    }
</style>
</head>

<body>

<button id="switch">Turn On</button>
<div id="message">blehhh 👅 love yaa</div>

<!-- Sound -->
<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
const button = document.getElementById("switch");
const message = document.getElementById("message");
const sound = document.getElementById("sound");

button.addEventListener("click", () => {
    document.body.classList.add("light-on");
    button.style.display = "none";

    // Play sound
    sound.play();

    // Show message
    setTimeout(() => {
        message.style.opacity = 1;
    }, 700);

    // Balloons
    for (let i = 0; i < 30; i++) {
        let balloon = document.createElement("div");
        balloon.classList.add("balloon");

        let size = 30 + Math.random() * 40;
        balloon.style.width = size + "px";
        balloon.style.height = size * 1.4 + "px";

        balloon.style.left = Math.random() * 100 + "vw";
        balloon.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
        balloon.style.animationDuration = (5 + Math.random() * 4) + "s";

        document.body.appendChild(balloon);
    }

    // Confetti
    for (let i = 0; i < 80; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.top = "-10px";
        confetti.style.background = `hsl(${Math.random() * 360}, 90%, 60%)`;

        let size = 6 + Math.random() * 8;
        confetti.style.width = size + "px";
        confetti.style.height = size + "px";

        confetti.style.animationDuration = (3 + Math.random() * 3) + "s";

        document.body.appendChild(confetti);
    }
});
</script>

</body>
</html>
