<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise 💡</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    transition: 1s;
    font-family: 'Press Start 2P', cursive;
    text-align: center;
    color: white;
}

.light {
    background: linear-gradient(to top, #ffd6e7, white);
    color: black;
}

/* SWITCH */
.switch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
}

.rope {
    width: 3px;
    height: 120px;
    background: white;
}

.knob {
    width: 30px;
    height: 30px;
    background: #ccc;
    border-radius: 50%;
    cursor: grab;
}

/* MESSAGE */
.msg {
    position: absolute;
    top: 20%;
    width: 100%;
    font-size: 22px;
    display: none;
}

/* CAT */
.cat {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    opacity: 0;
    transition: 1s;
}

/* BALLOONS */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 50px;
    border-radius: 50%;
    animation: up linear infinite;
}

.balloon::after {
    content: '';
    width: 2px;
    height: 50px;
    background: black;
    position: absolute;
    top: 50px;
    left: 50%;
}

@keyframes up {
    to { transform: translateY(-120vh); }
}

/* CONFETTI */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<div class="switch">
    <div id="rope" class="rope"></div>
    <div id="knob" class="knob"></div>
</div>

<div id="msg" class="msg">bleh I love you 👅</div>
<img src="cat.png" id="cat" class="cat">

<audio id="music">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<audio id="switchSfx" src="https://www.soundjay.com/switch/switch-1.mp3"></audio>
<audio id="confettiSfx" src="https://www.soundjay.com/human/cheer-01.mp3"></audio>

<script>
let dragging = false;

let knob = document.getElementById("knob");
let rope = document.getElementById("rope");

knob.onmousedown = () => dragging = true;
document.onmouseup = () => dragging = false;

document.onmousemove = (e) => {
    if (!dragging) return;

    let y = e.clientY;
    rope.style.height = Math.min(250, y) + "px";

    if (y > 220) activate();
};

function activate() {
    dragging = false;

    document.body.classList.add("light");
    document.getElementById("msg").style.display = "block";

    let cat = document.getElementById("cat");
    cat.style.opacity = 1;

    // SOUND
    document.getElementById("switchSfx").play();

    let music = document.getElementById("music");
    music.play().catch(()=>{});

    setTimeout(()=>{
        document.getElementById("confettiSfx").play();
    },300);

    balloons();
    confetti();
}

function balloons() {
    for(let i=0;i<20;i++){
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"vw";
        b.style.background=randomColor();
        b.style.animationDuration=(4+Math.random()*3)+"s";
        document.body.appendChild(b);
    }
}

function confetti() {
    for(let i=0;i<60;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=randomColor();
        c.style.animationDuration=(2+Math.random()*2)+"s";
        document.body.appendChild(c);
    }
}

function randomColor(){
    let colors=["red","blue","yellow","green","pink","orange","purple"];
    return colors[Math.floor(Math.random()*colors.length)];
}
</script>

</body>
</html>
