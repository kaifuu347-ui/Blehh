<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise 💡</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    transition: 1s;
    font-family: 'Press Start 2P', cursive;
    text-align: center;
    color: white;
}

.light {
    background: linear-gradient(to top, #ffd6e7, white);
    color: black;
}

/* SWITCH */
.switch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
}

.rope {
    width: 3px;
    height: 120px;
    background: white;
}

.knob {
    width: 30px;
    height: 30px;
    background: #ccc;
    border-radius: 50%;
    cursor: grab;
}

/* TEXT */
.msg {
    position: absolute;
    top: 18%;
    width: 100%;
    font-size: 20px;
    display: none;
}

/* CAT */
.cat {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 230px;
    display: none;
}

/* BUTTONS */
.buttons {
    position: absolute;
    bottom: 120px;
    width: 100%;
    display: none;
}

button {
    font-family: 'Press Start 2P';
    padding: 10px;
    margin: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

button:hover {
    background: pink;
    color: black;
}

/* BALLOONS */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 50px;
    border-radius: 50%;
    animation: up linear forwards;
}

.balloon::after {
    content: '';
    width: 2px;
    height: 50px;
    background: black;
    position: absolute;
    top: 50px;
    left: 50%;
}

@keyframes up {
    to { transform: translateY(-120vh); }
}

/* CONFETTI */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall linear;
}

@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<div class="switch">
    <div id="rope" class="rope"></div>
    <div id="knob" class="knob"></div>
</div>

<div id="msg" class="msg">bleh I love you 👅</div>
<img src="https://i.imgur.com/3ZQ3Z4p.png" id="cat" class="cat">

<div id="buttons" class="buttons">
    <button onclick="reply('thank')">THANK YOU</button>
    <button onclick="reply('nah')">THERE WAS NO NEED FOR THIS</button>
</div>

<div id="replyText" class="msg" style="top:50%; display:none;"></div>

<audio id="music">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<audio id="switchSfx" src="https://www.soundjay.com/switch/switch-1.mp3"></audio>
<audio id="confettiSfx" src="https://www.soundjay.com/human/cheer-01.mp3"></audio>

<script>
let dragging = false;
let activated = false;

const knob = document.getElementById("knob");
const rope = document.getElementById("rope");

/* START DRAG */
knob.addEventListener("mousedown", () => dragging = true);
knob.addEventListener("touchstart", () => dragging = true);

/* STOP DRAG */
document.addEventListener("mouseup", () => dragging = false);
document.addEventListener("touchend", () => dragging = false);

/* DRAG MOVE */
document.addEventListener("mousemove", handleDrag);
document.addEventListener("touchmove", handleDrag);

function handleDrag(e) {
    if (!dragging || activated) return;

    let y = e.touches ? e.touches[0].clientY : e.clientY;

    let length = Math.min(250, Math.max(120, y));
    rope.style.height = length + "px";

    if (length > 220) {
        activated = true;
        activate();
    }
}

/* ACTIVATE */
function activate() {
    document.body.classList.add("light");
    document.getElementById("msg").style.display = "block";
    document.getElementById("cat").style.display = "block";

    document.getElementById("switchSfx").play();

    let music = document.getElementById("music");
    music.play().catch(()=>{});

    setTimeout(()=>{
        document.getElementById("confettiSfx").play();
    },300);

    balloons();
    confetti();

    setTimeout(()=>{
        document.getElementById("buttons").style.display = "block";
    },4000);
}

/* EFFECTS */
function balloons() {
    for(let i=0;i<20;i++){
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"vw";
        b.style.background=randomColor();
        b.style.animationDuration=(3+Math.random()*2)+"s";
        document.body.appendChild(b);
    }
}

function confetti() {
    for(let i=0;i<60;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=randomColor();
        c.style.animationDuration=(2+Math.random()*2)+"s";
        document.body.appendChild(c);
    }
}

/* BUTTON RESPONSE */
function reply(type){
    let text = document.getElementById("replyText");
    text.style.display = "block";

    if(type === "thank"){
        text.innerHTML = "muahh ly 🥰";
    } else {
        text.innerHTML = "katti yawr 😡😔";
    }
}

/* COLORS */
function randomColor(){
    let colors=["red","blue","yellow","green","pink","orange","purple"];
    return colors[Math.floor(Math.random()*colors.length)];
}
</script>

</body>
</html>
