<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise 💡</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #000;
        transition: background 1s;
        font-family: Arial, sans-serif;
        text-align: center;
        color: white;
    }

    body.light-on {
        background: linear-gradient(to top, #ffd6e7, #fff);
        color: black;
    }

    .switch {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        cursor: pointer;
    }

    .string {
        width: 2px;
        height: 150px;
        background: white;
        margin: auto;
    }

    .handle {
        width: 30px;
        height: 30px;
        background: #ccc;
        border-radius: 50%;
        margin: auto;
    }

    .hidden {
        display: none;
    }

    .cat {
        position: absolute;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 100px;
    }

    .message {
        font-size: 28px;
        margin-top: 20px;
    }

    .balloon {
        position: absolute;
        bottom: -100px;
        width: 40px;
        height: 50px;
        border-radius: 50%;
        animation: floatUp 6s linear infinite;
    }

    .balloon::after {
        content: '';
        position: absolute;
        width: 2px;
        height: 50px;
        background: black;
        left: 50%;
        top: 50px;
    }

    @keyframes floatUp {
        from { transform: translateY(0); }
        to { transform: translateY(-120vh); }
    }

    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        animation: fall 3s linear infinite;
    }

    @keyframes fall {
        from { transform: translateY(-10vh) rotate(0deg); }
        to { transform: translateY(100vh) rotate(360deg); }
    }
</style>
</head>

<body>

<div class="switch" onclick="turnOn()">
    <div class="string"></div>
    <div class="handle"></div>
</div>

<div id="content" class="hidden">
    <div class="cat">🐱💐</div>
    <div class="message">bleh I love you 👅</div>
</div>

<audio id="clickSound" src="https://www.soundjay.com/switch/switch-1.mp3"></audio>
<audio id="partySound" src="https://www.soundjay.com/human/cheer-01.mp3"></audio>

<!-- ✅ YOUR SONG -->
<audio id="music" src="Careless whisper.mp3" loop></audio>

<script>
function turnOn() {
    document.body.classList.add("light-on");
    document.getElementById("content").classList.remove("hidden");

    document.getElementById("clickSound").play();
    document.getElementById("partySound").play();

    let music = document.getElementById("music");
    music.currentTime = 0;
    music.play();

    createBalloons();
    createConfetti();
}

function createBalloons() {
    for (let i = 0; i < 15; i++) {
        let b = document.createElement("div");
        b.className = "balloon";
        b.style.left = Math.random() * 100 + "vw";
        b.style.background = getRandomColor();
        b.style.animationDuration = (4 + Math.random() * 3) + "s";
        document.body.appendChild(b);
    }
}

function createConfetti() {
    for (let i = 0; i < 40; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = getRandomColor();
        c.style.animationDuration = (2 + Math.random() * 2) + "s";
        document.body.appendChild(c);
    }
}

function getRandomColor() {
    const colors = ["red", "blue", "yellow", "green", "pink", "orange", "purple"];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
