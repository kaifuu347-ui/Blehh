<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise 💡</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
    transition: background 1s;
    text-align: center;
    color: white;
    font-family: 'Press Start 2P', cursive;
}

/* Lights ON */
body.light-on {
    background: linear-gradient(to top, #ffd6e7, #fff);
    color: black;
}

/* Rope Switch */
.switch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
}

.string {
    width: 3px;
    height: 150px;
    background: white;
    margin: auto;
    transition: height 0.2s;
}

.handle {
    width: 30px;
    height: 30px;
    background: #ccc;
    border-radius: 50%;
    margin: auto;
    cursor: grab;
}

/* Content */
.hidden {
    display: none;
}

.cat-img {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    opacity: 0;
    transition: opacity 1.5s ease;
}

.show-cat {
    opacity: 1;
}

.message {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 22px;
}

/* Balloons */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 50px;
    border-radius: 50%;
    animation: floatUp linear infinite;
}

.balloon::after {
    content: '';
    position: absolute;
    width: 2px;
    height: 50px;
    background: black;
    left: 50%;
    top: 50px;
}

@keyframes floatUp {
    from { transform: translateY(0); }
    to { transform: translateY(-120vh); }
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-10vh) rotate(0deg); }
    to { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- Rope Switch -->
<div class="switch">
    <div id="rope" class="string"></div>
    <div id="handle" class="handle"></div>
</div>

<!-- Content -->
<div id="content" class="hidden">
    <div class="message">bleh I love you 👅</div>
    <img src="cat.png" class="cat-img" id="cat">
</div>

<!-- Audio -->
<audio id="music" src="careless-whisper.mp3" loop></audio>
<audio id="switchSound" src="https://www.soundjay.com/switch/switch-1.mp3"></audio>
<audio id="confettiSound" src="https://www.soundjay.com/human/cheer-01.mp3"></audio>

<script>
let dragged = false;

const handle = document.getElementById("handle");
const rope = document.getElementById("rope");

handle.addEventListener("mousedown", startDrag);
handle.addEventListener("touchstart", startDrag);

function startDrag() {
    dragged = true;
}

document.addEventListener("mousemove", drag);
document.addEventListener("touchmove", drag);

function drag(e) {
    if (!dragged) return;

    let y = e.touches ? e.touches[0].clientY : e.clientY;
    let length = Math.min(300, y);

    rope.style.height = length + "px";

    if (length > 220) {
        dragged = false;
        turnOn();
    }
}

function turnOn() {
    document.body.classList.add("light-on");
    document.getElementById("content").classList.remove("hidden");

    // 🔌 Switch sound
    let s = document.getElementById("switchSound");
    s.currentTime = 0;
    s.play();

    // 🎶 Music
    let music = document.getElementById("music");
    music.currentTime = 0;
    music.play().catch(()=>{});

    // 🎉 Confetti sound
    setTimeout(() => {
        let c = document.getElementById("confettiSound");
        c.currentTime = 0;
        c.play();
    }, 300);

    // Show cat
    setTimeout(() => {
        document.getElementById("cat").classList.add("show-cat");
    }, 500);

    createBalloons();
    createConfetti();
}

function createBalloons() {
    for (let i = 0; i < 20; i++) {
        let b = document.createElement("div");
        b.className = "balloon";
        b.style.left = Math.random() * 100 + "vw";
        b.style.background = getRandomColor();
        b.style.animationDuration = (4 + Math.random() * 3) + "s";
        document.body.appendChild(b);
    }
}

function createConfetti() {
    for (let i = 0; i < 60; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = getRandomColor();
        c.style.animationDuration = (2 + Math.random() * 2) + "s";
        document.body.appendChild(c);
    }
}

function getRandomColor() {
    const colors = ["red", "blue", "yellow", "green", "pink", "orange", "purple"];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
    </html>
